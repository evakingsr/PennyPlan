<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Budget</title>
  <link rel="stylesheet" href="budget.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Simple Budget</h1>
      <p class="subtitle">Track your income and expenses</p>
    </header>

    <section class="summary">
      <div class="summary-card income">
        <span class="summary-label">Income</span>
        <span class="summary-value" id="totalIncome">$0.00</span>
      </div>
      <div class="summary-card expense">
        <span class="summary-label">Expenses</span>
        <span class="summary-value" id="totalExpense">$0.00</span>
      </div>
      <div class="summary-card balance">
        <span class="summary-label">Balance</span>
        <span class="summary-value" id="balance">$0.00</span>
      </div>
    </section>

    <form class="entry-form" id="entryForm">
      <div class="field">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="e.g. Groceries" required />
      </div>

      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required />
      </div>

      <div class="field">
        <label for="type">Type</label>
        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>

      <button type="submit" class="add-btn">Add Entry</button>
    </form>

    <section class="entries">
      <h2>Transactions</h2>
      <ul class="entry-list" id="entryList"></ul>
      <p class="empty-state" id="emptyState">No entries yet. Add one above!</p>
    </section>
  </div>

  <script>
    const form = document.getElementById('entryForm');
    const entryList = document.getElementById('entryList');
    const emptyState = document.getElementById('emptyState');
    const totalIncomeEl = document.getElementById('totalIncome');
    const totalExpenseEl = document.getElementById('totalExpense');
    const balanceEl = document.getElementById('balance');

    let entries = [];

    function formatMoney(value) {
      return '$' + value.toFixed(2);
    }

    function render() {
      entryList.innerHTML = '';

      let income = 0;
      let expense = 0;

      entries.forEach((entry, index) => {
        if (entry.type === 'income') {
          income += entry.amount;
        } else {
          expense += entry.amount;
        }

        const li = document.createElement('li');
        li.className = 'entry-item ' + entry.type;

        li.innerHTML = `
          <span class="entry-desc">${entry.description}</span>
          <span class="entry-amount">${entry.type === 'expense' ? '-' : '+'}${formatMoney(entry.amount)}</span>
          <button class="delete-btn" data-index="${index}" aria-label="Delete entry">&times;</button>
        `;

        entryList.appendChild(li);
      });

      totalIncomeEl.textContent = formatMoney(income);
      totalExpenseEl.textContent = formatMoney(expense);
      balanceEl.textContent = formatMoney(income - expense);

      emptyState.style.display = entries.length === 0 ? 'block' : 'none';
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const description = document.getElementById('description').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const type = document.getElementById('type').value;

      if (!description || isNaN(amount) || amount <= 0) return;

      entries.push({ description, amount, type });
      form.reset();
      render();
    });

    entryList.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) {
        const index = parseInt(e.target.dataset.index, 10);
        entries.splice(index, 1);
        render();
      }
    });

    render();
  </script>
</body>
</html>
