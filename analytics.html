<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PennyPlan — Analytics</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="pennyplan.css" />
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    <script src="shared.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useState, useEffect } = React;

      const seedExpenses = () => ([
        { id: "d1", category: "Groceries", amount: 127.5, expense_date: "2026-07-02" },
        { id: "d2", category: "Dining", amount: 53.15, expense_date: "2026-07-03" },
        { id: "d3", category: "Transport", amount: 30, expense_date: "2026-07-04" },
        { id: "d4", category: "Entertainment", amount: 22, expense_date: "2026-07-06" },
      ]);
      const seedCompare = () => ([
        { category: "Groceries", budget: 200, spent: 127.5, remaining: 72.5, status: "Under Budget" },
        { category: "Dining", budget: 40, spent: 53.15, remaining: -13.15, status: "Over Budget" },
        { category: "Transport", budget: 60, spent: 30, remaining: 30, status: "Under Budget" },
        { category: "Entertainment", budget: 50, spent: 22, remaining: 28, status: "Under Budget" },
      ]);
      const seedBudgets = () => ([
        { id: "b1", category: "Groceries", monthly_limit: 200 },
        { id: "b2", category: "Dining", monthly_limit: 40 },
      ]);

      function Donut({ data, onHover, hoveredLabel }) {
        const total = data.reduce((s, d) => s + d.value, 0) || 1;
        const R = 70, CENTER = 90, stroke = 26;
        const circumference = 2 * Math.PI * R;
        let offset = 0;

        return (
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle cx={CENTER} cy={CENTER} r={R} fill="none" stroke="#e6ecea" strokeWidth={stroke} />
            {data.map((d, i) => {
              const fraction = d.value / total;
              const dash = fraction * circumference;
              const slice = (
                <circle
                  key={d.label}
                  cx={CENTER} cy={CENTER} r={R}
                  fill="none"
                  stroke={CHART_COLORS[i % CHART_COLORS.length]}
                  strokeWidth={stroke}
                  strokeDasharray={`${dash} ${circumference - dash}`}
                  strokeDashoffset={-offset}
                  transform={`rotate(-90 ${CENTER} ${CENTER})`}
                  className={"donut-slice" + (hoveredLabel && hoveredLabel !== d.label ? " dim" : "")}
                  onMouseEnter={(e) => onHover(d, e)}
                  onMouseMove={(e) => onHover(d, e)}
                  onMouseLeave={() => onHover(null)}
                />
              );
              offset += dash;
              return slice;
            })}
            <text x={CENTER} y={CENTER - 4} textAnchor="middle" fontWeight="800" fontSize="20" fill="#183c40">
              {money(total).replace(".00", "")}
            </text>
            <text x={CENTER} y={CENTER + 16} textAnchor="middle" fontSize="11" fill="#6b7d7f">category total</text>
          </svg>
        );
      }

      function App() {
        const [expenses, setExpenses] = useState([]);
        const [compare, setCompare] = useState([]);
        const [budgets, setBudgets] = useState([]);
        const [offline, setOffline] = useState(false);
        const [error, setError] = useState("");
        const [budgetForm, setBudgetForm] = useState({ category: "Groceries", monthly_limit: "" });
        const [editingId, setEditingId] = useState(null);
        const [editForm, setEditForm] = useState({ category: "", monthly_limit: "" });
        const [tip, setTip] = useState(null);
        const [hovered, setHovered] = useState(null);

        useEffect(() => { load(); }, []);

        async function load() {
          let wentOffline = false;
          const userId = getCurrentUserId();

          try {
            const ex = await PennyAPI.getExpenses(userId);
            setExpenses(Array.isArray(ex) ? ex : []);
          } catch {
            setExpenses(seedExpenses());
            wentOffline = true;
          }

          try {
            const cmp = await PennyAPI.compareBudgets(userId);
            setCompare(Array.isArray(cmp) ? cmp : []);
          } catch {
            setCompare(seedCompare());
            wentOffline = true;
          }

          try {
            const b = await PennyAPI.getBudgets(userId);
            setBudgets(Array.isArray(b) ? b : []);
          } catch {
            setBudgets(seedBudgets());
            wentOffline = true;
          }

          setOffline(wentOffline);
        }

        function handleChange(event) {
          setBudgetForm({ ...budgetForm, [event.target.name]: event.target.value });
        }

        async function addBudget(event) {
          event.preventDefault();
          setError("");
          const limit = parseFloat(budgetForm.monthly_limit);
          if (isNaN(limit) || limit <= 0) {
            setError("Enter a monthly limit greater than 0.");
            return;
          }
          if (offline) {
            setError("Backend is offline — can't save budgets right now.");
            return;
          }
          try {
            await PennyAPI.addBudget({
              user_id: getCurrentUserId(),
              category: budgetForm.category,
              monthly_limit: limit,
            });
            setBudgetForm({ category: budgetForm.category, monthly_limit: "" });
            await load();
          } catch (err) {
            setError(err.message);
          }
        }

        function startEdit(b) {
          setEditingId(b.id);
          setEditForm({ category: b.category, monthly_limit: b.monthly_limit });
        }
        function cancelEdit() { setEditingId(null); }

        async function saveEdit(id) {
          setError("");
          const limit = parseFloat(editForm.monthly_limit);
          if (isNaN(limit) || limit <= 0) {
            setError("Enter a monthly limit greater than 0.");
            return;
          }
          try {
            await PennyAPI.updateBudget(id, { category: editForm.category, monthly_limit: limit });
            setEditingId(null);
            await load();
          } catch (err) {
            setError(err.message);
          }
        }

        async function removeBudget(id) {
          try {
            await PennyAPI.deleteBudget(id);
            await load();
          } catch (err) {
            setError(err.message);
          }
        }

        const now = new Date();
        const thisMonthPrefix = now.toISOString().slice(0, 7);
        const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const lastMonthPrefix = lastMonthDate.toISOString().slice(0, 7);

        const sumFor = (prefix) => expenses
          .filter((e) => (e.expense_date || "").startsWith(prefix))
          .reduce((s, e) => s + Number(e.amount || 0), 0);

        const totalAllTime = expenses.reduce((s, e) => s + Number(e.amount || 0), 0);
        const totalThisMonth = sumFor(thisMonthPrefix);
        const totalLastMonth = sumFor(lastMonthPrefix);

        const byCategory = {};
        expenses
          .filter((e) => (e.expense_date || "").startsWith(thisMonthPrefix))
          .forEach((e) => {
            byCategory[e.category] = (byCategory[e.category] || 0) + Number(e.amount || 0);
          });
        const thisMonthData = Object.entries(byCategory)
          .map(([label, value]) => ({ label, value }))
          .filter((d) => d.value > 0)
          .sort((a, b) => b.value - a.value);

        const donutTotal = thisMonthData.reduce((s, d) => s + d.value, 0);
        const overCount = compare.filter((c) => c.status === "Over Budget").length;

        function showTip(event, title, rows) {
          setTip({ x: event.clientX, y: event.clientY, title, rows });
        }

        return (
          <>
            <TopBar active="analytics" />
            <main className="page">
              <div className="intro">
                <h2>Your spending at a glance</h2>
                <p>Hover any slice or bar to see the exact numbers behind it.</p>
              </div>

              <div className="tiles" style={{ gridTemplateColumns: "repeat(4, 1fr)" }}>
                <div className="tile accent">
                  <div className="label">Total Spent (All Time)</div>
                  <div className="value">{money(totalAllTime)}</div>
                </div>
                <div className="tile bad">
                  <div className="label">This Month</div>
                  <div className="value">{money(totalThisMonth)}</div>
                </div>
                <div className="tile">
                  <div className="label">Last Month</div>
                  <div className="value">{money(totalLastMonth)}</div>
                </div>
                <div className={"tile " + (overCount ? "bad" : "good")}>
                  <div className="label">Over Budget</div>
                  <div className="value">{overCount}</div>
                </div>
              </div>

              {offline && (
                <div className="banner info">
                  Can't reach the backend at {API_BASE} — showing demo analytics.
                </div>
              )}
              {error && <div className="banner err">{error}</div>}

              <div className="grid-2">
                <section className="card">
                  <div className="section-title">Set a Monthly Budget</div>
                  <form onSubmit={addBudget}>
                    <div className="field">
                      <label htmlFor="bcat">Category</label>
                      <select id="bcat" name="category" value={budgetForm.category} onChange={handleChange}>
                        {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div className="field">
                      <label htmlFor="blimit">Monthly Limit ($)</label>
                      <input id="blimit" name="monthly_limit" type="number" step="0.01" min="0" placeholder="0.00"
                             value={budgetForm.monthly_limit} onChange={handleChange} required />
                    </div>
                    <button className="btn" type="submit">Save Budget</button>
                  </form>

                  {budgets.length > 0 && (
                    <div style={{ marginTop: "20px" }}>
                      <div className="section-title" style={{ fontSize: "0.9rem" }}>Your Budgets</div>
                      <ul className="list">
                        {budgets.map((b) => (
                          <li className="list-item" key={b.id} style={{ gridTemplateColumns: editingId === b.id ? "1fr" : "1fr auto auto" }}>
                            {editingId === b.id ? (
                              <div className="budget-edit-row">
                                <select
                                  value={editForm.category}
                                  onChange={(e) => setEditForm({ ...editForm, category: e.target.value })}
                                >
                                  {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <input
                                  type="number" step="0.01" min="0"
                                  value={editForm.monthly_limit}
                                  onChange={(e) => setEditForm({ ...editForm, monthly_limit: e.target.value })}
                                />
                                <button className="btn small" onClick={() => saveEdit(b.id)}>Save</button>
                                <button className="icon-btn" onClick={cancelEdit} aria-label="Cancel">×</button>
                              </div>
                            ) : (
                              <>
                                <div>
                                  <strong>{b.category}</strong>
                                  <div className="meta">{money(b.monthly_limit)} / month</div>
                                </div>
                                <button className="btn small" onClick={() => startEdit(b)}>Edit</button>
                                <button className="icon-btn" onClick={() => removeBudget(b.id)} aria-label="Delete">×</button>
                              </>
                            )}
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </section>

                <section className="card">
                  <div className="section-title">Spending by Category (This Month)</div>
                  {thisMonthData.length === 0 ? (
                    <p className="empty">No spending yet this month. Add expenses on the Home page.</p>
                  ) : (
                    <div className="donut-wrap">
                      <Donut
                        data={thisMonthData}
                        hoveredLabel={hovered}
                        onHover={(slice, ev) => {
                          if (!slice) {
                            setHovered(null);
                            setTip(null);
                            return;
                          }
                          setHovered(slice.label);
                          const share = ((slice.value / donutTotal) * 100).toFixed(1) + "%";
                          showTip(ev, slice.label, [
                            { label: "Spent", value: money(slice.value) },
                            { label: "Share", value: share },
                          ]);
                        }}
                      />
                      <div className="legend">
                        {thisMonthData.map((d, i) => (
                          <div className="legend-item" key={d.label}>
                            <span className="swatch" style={{ background: CHART_COLORS[i % CHART_COLORS.length] }} />
                            {d.label} — {money(d.value)}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </section>
              </div>

              <section className="card" style={{ marginTop: "22px" }}>
                <div className="section-title">Budget vs. Actual (This Month)</div>
                {compare.length === 0 ? (
                  <p className="empty">No budgets yet. Set one on the left to compare against your spending.</p>
                ) : (
                  <div className="bars">
                    {compare.map((c) => {
                      const over = c.status === "Over Budget";
                      const pct = c.budget > 0 ? Math.min(100, (c.spent / c.budget) * 100) : 0;
                      return (
                        <div
                          className="bar-row"
                          key={c.category}
                          onMouseEnter={(ev) => showTip(ev, c.category, [
                            { label: "Budget", value: money(c.budget) },
                            { label: "Spent", value: money(c.spent) },
                            {
                              label: over ? "Over by" : "Remaining",
                              value: money(Math.abs(c.remaining)),
                              tone: over ? "b" : "g",
                            },
                          ])}
                          onMouseLeave={() => setTip(null)}
                        >
                          <span className="bar-label">{c.category}</span>
                          <div className="bar-track">
                            <div className="bar-fill"
                                 style={{ width: pct + "%", background: over ? "var(--bad)" : "var(--ink)" }} />
                          </div>
                          <span className="bar-value" style={{ color: over ? "var(--bad)" : "var(--ink)" }}>
                            {money(c.spent).replace(".00", "")}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </section>
            </main>

            {tip && (
              <div className="tooltip" style={{ left: tip.x, top: tip.y }}>
                <div className="t-title">{tip.title}</div>
                {tip.rows.map((row, i) => (
                  <div className="t-row" key={i}>
                    <span>{row.label}</span>
                    <span className={row.tone || ""}>{row.value}</span>
                  </div>
                ))}
              </div>
            )}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
